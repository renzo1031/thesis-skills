interface:
  display_name: "论文标准化"
  short_description: "论文工作台、Word批注、文献引用和风格报告"
  default_prompt: "Use $thesis-standardizer to initialize thesis-ai-standard and paper-context workflow logs, resolve school standards, build source/PDF evidence indexes, extract Word comments when a DOCX draft exists, create citation cross-references, generate an AIGC style-risk report when drafts exist, and draft or revise chapters only after evidence gaps are listed."
policy:
  allow_implicit_invocation: true
